<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Static Obsidian</title>
<link rel="icon" type="image/svg+xml" href="assets/logo.svg">
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <img id="logo" src="assets/logo.svg" alt="logo">
    <span id="filename" title="Double-click to rename">untitled.md</span>
    <div id="toolbar">
      <span class="tb-dropdown-wrap">
        <button class="tb-btn" data-tb="format" title="Format">A▾</button>
        <div class="tb-dropdown tb-format-dropdown">
          <button data-cmd="bold"><strong>B</strong> Bold</button>
          <button data-cmd="italic"><em>I</em> Italic</button>
          <button data-cmd="highlight">H Highlight</button>
        </div>
      </span>
      <span class="tb-sep"></span>
      <span class="tb-dropdown-wrap">
        <button class="tb-btn" data-tb="heading" title="Heading">H▾</button>
        <div class="tb-dropdown">
          <button data-level="1">H1</button>
          <button data-level="2">H2</button>
          <button data-level="3">H3</button>
          <button data-level="4">H4</button>
          <button data-level="5">H5</button>
          <button data-level="6">H6</button>
        </div>
      </span>
      <button class="tb-btn" data-tb="ul" title="Bullet list">•</button>
      <button class="tb-btn" data-tb="ol" title="Numbered list">1.</button>
      <button class="tb-btn" data-tb="hr" title="Horizontal rule">—</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" data-tb="wikilink" title="Wiki-link">[[ ]]</button>
      <span class="tb-sep"></span>
      <span class="tb-dropdown-wrap">
        <button class="tb-btn" data-tb="callout" title="Callout">▣▾</button>
        <div class="tb-dropdown">
          <button data-type="note">Note</button>
          <button data-type="info">Info</button>
          <button data-type="tip">Tip</button>
          <button data-type="warning">Warning</button>
          <button data-type="danger">Danger</button>
          <button data-type="quote">Quote</button>
        </div>
      </span>
      <span class="tb-sep"></span>
      <span class="tb-dropdown-wrap">
        <button class="tb-btn" data-tb="snippets" title="Snippets">S▾</button>
        <div class="tb-dropdown tb-snippets-dropdown">
          <button data-snippet="code-js">Code (JS)</button>
          <button data-snippet="code-py">Code (Python)</button>
          <button data-snippet="code-bash">Code (Bash)</button>
          <button data-snippet="code-html">Code (HTML)</button>
          <button data-snippet="mermaid">Mermaid</button>
          <button data-snippet="latex">LaTeX block</button>
          <button data-snippet="img-embed">Image embed</button>
          <button data-snippet="link">Link</button>
          <button data-snippet="todo">Todo list</button>
          <button data-snippet="pagebreak">Page Break</button>
        </div>
      </span>
      <span class="tb-dropdown-wrap">
        <button class="tb-btn" data-tb="table" title="Insert table">⊞▾</button>
        <div class="tb-dropdown tb-table-dropdown">
          <button data-rows="2" data-cols="2">2 x 2</button>
          <button data-rows="3" data-cols="3">3 x 3</button>
          <button data-rows="4" data-cols="4">4 x 4</button>
          <button data-rows="5" data-cols="5">5 x 5</button>
          <button data-rows="3" data-cols="4">3 x 4</button>
          <button data-rows="4" data-cols="5">4 x 5</button>
          <button data-rows="2" data-cols="6">2 x 6</button>
        </div>
      </span>
    </div>
    <button id="show-sidebar-btn" title="Toggle file tree">&#x2630; Files</button>
    <button id="images-btn">Images</button>
    <button id="export-btn">Export</button>
    <button id="settings-btn" title="Settings">&#x2699;</button>
  </header>
  <div id="images-overlay" class="hidden">
    <div id="images-overlay-header">
      <span class="window-title">Stored Images</span>
      <div class="window-controls">
        <button id="images-overlay-close">&times;</button>
      </div>
    </div>
    <div id="images-overlay-list"></div>
  </div>
  <main id="split-pane">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span class="window-title">Files</span>
        <div class="window-controls">
          <button id="new-note-btn" title="New note">+</button>
          <button id="sidebar-hide-btn" title="Hide file tree">─</button>
        </div>
      </div>
      <div id="file-list"></div>
      <div id="sidebar-footer">
        <button id="sidebar-import-btn">Import vault</button>
        <a id="repo-link" href="https://github.com/blqnk3d/Obsidian-web" target="_blank" title="View on GitHub"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg> GitHub</a>
      </div>
    </aside>
    <section id="editor-pane">
      <textarea id="editor" spellcheck="false" placeholder="Start writing..."></textarea>
    </section>
    <div id="split-divider"></div>
    <section id="preview-pane">
      <div id="preview"></div>
    </section>
  </main>
</div>

<script type="importmap">
{
  "imports": {
    "markdown-it": "https://cdn.jsdelivr.net/npm/markdown-it@14.1.1/+esm",
    "dompurify": "https://cdn.jsdelivr.net/npm/dompurify@3.2.4/+esm",
    "katex": "https://cdn.jsdelivr.net/npm/katex@0.16.11/+esm",
    "mermaid": "https://cdn.jsdelivr.net/npm/mermaid@11.4.1/+esm"
  }
}
</script>

<script type="module" src="src/app.js?v=2"></script>
</body>
</html>
