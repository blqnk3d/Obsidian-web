<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Static Obsidian</title>
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <span id="filename">untitled.md</span>
    <span id="save-indicator" class="saved">saved</span>
    <button id="export-btn">Export</button>
    <button id="import-btn">Import</button>
  </header>
  <main id="split-pane">
    <section id="editor-pane">
      <textarea id="editor" spellcheck="false" placeholder="Start writing..."></textarea>
    </section>
    <section id="preview-pane">
      <div id="preview"></div>
    </section>
  </main>
</div>

<script type="importmap">
{
  "imports": {
    "markdown-it": "https://cdn.jsdelivr.net/npm/markdown-it@14.1.1/+esm",
    "dompurify": "https://cdn.jsdelivr.net/npm/dompurify@3.2.4/+esm",
    "katex": "https://cdn.jsdelivr.net/npm/katex@0.16.11/+esm",
    "mermaid": "https://cdn.jsdelivr.net/npm/mermaid@11.4.1/+esm"
  }
}
</script>

<script type="module" src="src/app.js"></script>
</body>
</html>
